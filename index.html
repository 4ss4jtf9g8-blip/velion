<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velion</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* VIDEO BACKGROUND */
.hero{
  position:relative;
  height:100vh;
  display:flex;
  align-items:center;
  padding:60px;
}
.hero video{
  position:absolute;
  top:0;left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter:brightness(0.4);
}

.hero-content{
  max-width:700px;
  animation:fadeUp 1s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1}
}

.hero h1{
  font-size:70px;
  line-height:1.1;
}
.hero p{
  margin-top:20px;
  color:#ccc;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:25px;
  padding:14px 30px;
  background:linear-gradient(135deg,#4f46e5,#06b6d4);
  border-radius:12px;
  text-decoration:none;
  color:#fff;
  transition:.4s;
}
.btn:hover{
  transform:translateY(-5px);
  box-shadow:0 20px 60px rgba(6,182,212,0.6);
}

/* NAV */
header{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:25px 40px;
  z-index:10;
}
nav a{
  margin-left:25px;
  color:#aaa;
  cursor:pointer;
}
nav a:hover{color:#fff}

/* SECTION */
.section{
  padding:120px 40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

/* CARD */
.card{
  position:relative;
  overflow:hidden;
  border-radius:16px;
  height:220px;
  cursor:pointer;
}
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.6s;
}
.card:hover img{
  transform:scale(1.1);
}
.card .overlay{
  position:absolute;
  bottom:0;
  padding:20px;
  background:linear-gradient(transparent,rgba(0,0,0,0.8));
  width:100%;
}

/* PARALLAX */
.parallax{
  transform:translateY(0);
  transition:transform 0.2s;
}

/* CONTACT */
.contact{
  font-size:18px;
  color:#ccc;
}
</style>
</head>

<body>

<header>
  <div>Velion</div>
  <nav>
    <a onclick="scrollToSection('portfolio')">Портфолио</a>
    <a onclick="scrollToSection('contact')">Контакты</a>
  </nav>
</header>

<!-- HERO VIDEO -->
<div class="hero">
  <video autoplay muted loop>
    <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
  </video>

  <div class="hero-content">
    <h1>Дизайн нового уровня</h1>
    <p>Мы создаём сайты, которые выглядят как продукт за $10,000+</p>
    <a class="btn" onclick="scrollToSection('portfolio')">Смотреть кейсы</a>
  </div>
</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="section">
  <h2>Кейсы</h2>

  <div class="grid">
    <div class="card parallax">
      <img src="https://picsum.photos/500/300?1">
      <div class="overlay">Luxury Brand</div>
    </div>

    <div class="card parallax">
      <img src="https://picsum.photos/500/300?2">
      <div class="overlay">E-commerce</div>
    </div>

    <div class="card parallax">
      <img src="https://picsum.photos/500/300?3">
      <div class="overlay">Startup Website</div>
    </div>
  </div>
</div>

<!-- CONTACT -->
<div id="contact" class="section">
  <h2>Контакты</h2>
  <div class="contact">
    <p>Email: velion.agency@gmail.com</p>
    <p>Telegram: @ChatGPT velion_agency</p>
  </div>
</div>

<script>
// плавный скролл
function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

// параллакс от мыши
document.addEventListener("mousemove", e=>{
  let x=(e.clientX/window.innerWidth-0.5)*20;
  let y=(e.clientY/window.innerHeight-0.5)*20;

  document.querySelectorAll(".parallax").forEach(el=>{
    el.style.transform=`translate(${x}px,${y}px)`;
  });
});
</script>

</body>
</html>
