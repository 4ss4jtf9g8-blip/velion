<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#0A0A0A;color:#fff}
.compare{position:relative;overflow:hidden;border-radius:20px}
.compare img{width:100%;height:400px;object-fit:cover}
.compare-after{position:absolute;top:0;left:0;width:50%}

<div class="compare-after">
<img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da">

<div class="slider"></div>
</div>

<p>Конверсия: 1.9% → 6.7% (+252%)</p>

class="mt-6 inline-block bg-[#00FF9F] text-black px-6 py-3 rounded-xl">

<script>
const el=document.querySelector('.compare');
const after=document.querySelector('.compare-after');
const slider=document.querySelector('.slider');

el.onmousemove=(e)=>{
let p=(e.offsetX/el.offsetWidth)*100;
after.style.width=p+"%";
slider.style.left=p+"%";
}
</script>
